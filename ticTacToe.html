<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tic Tac Toe | TheVsHub Games</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --x-color: #ff4d4d;
            --o-color: #3b82f6;
            --win-color: #2ecc71;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 70%);
        }

        /* --- Header & Navigation --- */
        header {
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .back-btn {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: var(--text-main);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--text-main);
            text-decoration: none;
        }

        .logo span {
            color: var(--o-color);
        }

        /* --- Game Area --- */
        .container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 20px;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .scoreboard {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            background: var(--card-bg);
            padding: 15px 30px;
            border-radius: 50px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .score-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .score-label {
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        .score-val {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .score-x {
            color: var(--x-color);
        }

        .score-o {
            color: var(--o-color);
        }

        /* --- Tic Tac Toe Board --- */
        .game-board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
            background: var(--card-bg);
            padding: 15px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .cell {
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 35px;
            font-weight: 900;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.2);
        }

        .cell:hover {
            background-color: rgba(255, 255, 255, 0.05);
        }

        .cell.x {
            color: var(--x-color);
            text-shadow: 0 0 15px rgba(255, 77, 77, 0.4);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cell.o {
            color: var(--o-color);
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
            animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .cell.winner {
            background-color: rgba(46, 204, 113, 0.2);
            color: var(--win-color);
            text-shadow: 0 0 20px rgba(46, 204, 113, 0.6);
            border: 2px solid var(--win-color);
        }

        /* --- Sparkle Animations --- */
        .celebrate {
            position: relative;
        }

        .sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px #fff, 0 0 20px var(--win-color);
            animation: sparkleAnimation 1s ease-in-out infinite;
            pointer-events: none;
        }

        .sparkle:nth-child(1) {
            top: 15%;
            left: 20%;
            animation-delay: 0s;
        }

        .sparkle:nth-child(2) {
            top: 25%;
            left: 75%;
            animation-delay: 0.2s;
        }

        .sparkle:nth-child(3) {
            top: 75%;
            left: 30%;
            animation-delay: 0.4s;
        }

        .sparkle:nth-child(4) {
            top: 70%;
            left: 80%;
            animation-delay: 0.6s;
        }

        @keyframes sparkleAnimation {

            0%,
            100% {
                opacity: 0;
                transform: scale(0) translateY(0);
            }

            50% {
                opacity: 1;
                transform: scale(1.5) translateY(-10px);
            }
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        /* --- Popup Modal --- */
        .popup {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .popup.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .popup-box {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            transform: scale(1);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .popup.hidden .popup-box {
            transform: scale(0.8);
        }

        #winner-message {
            font-size: 2.5rem;
            margin-bottom: 25px;
            color: white;
        }

        #new-game-btn {
            background: var(--o-color);
            color: white;
            border: none;
            padding: 12px 35px;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
        }

        #new-game-btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
        }

        /* Current Player Indicator */
        .turn-indicator {
            margin-top: 20px;
            font-size: 1.2rem;
            color: var(--text-muted);
        }

        .turn-indicator span {
            font-weight: bold;
            font-size: 1.5rem;
        }

        @media (max-width: 400px) {
            .game-board {
                grid-template-columns: repeat(3, 80px);
                grid-template-rows: repeat(3, 80px);
            }

            .cell {
                font-size: 40px;
            }
        }
    </style>
</head>

<body>

    <header>
        <a href="./index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back to Games</a>
        <div class="logo">TheVsHub <span>Games</span></div>
    </header>

    <div class="container">
        <h1>Tic Tac Toe</h1>

        <div class="scoreboard">
            <div class="score-item">
                <span class="score-label">Player X</span>
                <span class="score-val score-x" id="scoreX">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">Draws</span>
                <span class="score-val" id="scoreDraws">0</span>
            </div>
            <div class="score-item">
                <span class="score-label">Player O</span>
                <span class="score-val score-o" id="scoreO">0</span>
            </div>
        </div>

        <div id="game-board" class="game-board"></div>

        <div class="turn-indicator">
            Turn: <span id="current-turn" class="score-x">X</span>
        </div>

        <div id="popup" class="popup hidden">
            <div class="popup-box">
                <h1 id="winner-message"></h1>
                <button id="new-game-btn">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        const board = document.getElementById("game-board");
        const popup = document.getElementById("popup");
        const winnerMessage = document.getElementById("winner-message");
        const newGameBtn = document.getElementById("new-game-btn");
        const currentTurnDisplay = document.getElementById("current-turn");

        // Score elements
        const scoreXDisplay = document.getElementById("scoreX");
        const scoreODisplay = document.getElementById("scoreO");
        const scoreDrawsDisplay = document.getElementById("scoreDraws");

        let gameState = ["", "", "", "", "", "", "", "", ""];
        let currentPlayer = "X";
        let gameActive = true;
        let scores = { X: 0, O: 0, Draws: 0 };

        const winningCombinations = [
            [0, 1, 2], [3, 4, 5], [6, 7, 8], // Rows
            [0, 3, 6], [1, 4, 7], [2, 5, 8], // Columns
            [0, 4, 8], [2, 4, 6]             // Diagonals
        ];

        // 1. Initialize Game Board dynamically
        function initBoard() {
            board.innerHTML = '';
            for (let i = 0; i < 9; i++) {
                const cell = document.createElement("div");
                cell.classList.add("cell");
                cell.setAttribute("data-index", i);
                cell.addEventListener("click", handleClick);
                board.appendChild(cell);
            }
        }

        // 2. Handle click
        function handleClick(e) {
            const cell = e.target;
            const index = cell.getAttribute("data-index");

            // Ignore if cell is filled or game is over
            if (gameState[index] !== "" || !gameActive) return;

            // Update State
            gameState[index] = currentPlayer;

            // Update UI
            cell.textContent = currentPlayer;
            cell.classList.add(currentPlayer.toLowerCase());

            checkGameStatus();
        }

        // 3. Check for Win or Draw
        function checkGameStatus() {
            let roundWon = false;
            let winningCells = [];

            for (let i = 0; i < winningCombinations.length; i++) {
                const [a, b, c] = winningCombinations[i];
                if (gameState[a] && gameState[a] === gameState[b] && gameState[a] === gameState[c]) {
                    roundWon = true;
                    winningCells = [a, b, c];
                    break;
                }
            }

            if (roundWon) {
                gameActive = false;
                scores[currentPlayer]++;
                updateScoreboard();
                highlightWinningCells(winningCells);

                // Delay popup so player can see the winning animation
                setTimeout(() => {
                    showPopup(`${currentPlayer} Wins! 🎉`);
                }, 800);
                return;
            }

            if (!gameState.includes("")) {
                gameActive = false;
                scores.Draws++;
                updateScoreboard();
                setTimeout(() => {
                    showPopup("It's a Draw! 🤝");
                }, 500);
                return;
            }

            // Switch turn
            currentPlayer = currentPlayer === "X" ? "O" : "X";
            currentTurnDisplay.textContent = currentPlayer;
            currentTurnDisplay.className = currentPlayer === "X" ? "score-x" : "score-o";
        }

        // 4. Visual Effects for Winning
        function highlightWinningCells(winningIndices) {
            const allCells = document.querySelectorAll(".cell");
            winningIndices.forEach(index => {
                const cell = allCells[index];
                cell.classList.add("winner", "celebrate");
                createSparkles(cell);
            });
        }

        function createSparkles(cell) {
            for (let i = 0; i < 4; i++) {
                const sparkle = document.createElement("div");
                sparkle.classList.add("sparkle");
                cell.appendChild(sparkle);
            }
        }

        // 5. UI Updates
        function updateScoreboard() {
            scoreXDisplay.textContent = scores.X;
            scoreODisplay.textContent = scores.O;
            scoreDrawsDisplay.textContent = scores.Draws;
        }

        function showPopup(message) {
            winnerMessage.textContent = message;
            popup.classList.remove("hidden");
        }

        function hidePopup() {
            popup.classList.add("hidden");
        }

        // 6. Reset functionality
        newGameBtn.addEventListener("click", resetGame);

        function resetGame() {
            gameState = ["", "", "", "", "", "", "", "", ""];
            currentPlayer = "X";
            gameActive = true;

            currentTurnDisplay.textContent = currentPlayer;
            currentTurnDisplay.className = "score-x";

            hidePopup();
            initBoard(); // Rebuild the board to clear all states, sparkles, and classes cleanly
        }

        // Boot up the game
        initBoard();
    </script>
</body>

</html>
